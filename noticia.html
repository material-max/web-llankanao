<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Noticia — Escuela Llankanao</title>
  <link rel="icon" href="assets/img/favicon.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<div class="page-hero" id="article-hero">
  <div class="container">
    <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Inicio</a></li><li class="breadcrumb-item"><a href="noticias.html">Noticias</a></li><li class="breadcrumb-item active" id="bc-title">Cargando...</li></ol></nav>
    <h1 id="hero-title">Cargando noticia...</h1>
  </div>
</div>

<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div id="article-content" class="loading-spinner">
          <div class="spinner-border" role="status"></div>
          <p class="mt-2">Cargando artículo...</p>
        </div>
      </div>
      <div class="col-lg-4 mt-4 mt-lg-0">
        <div class="card border-0 shadow-sm p-4 mb-4">
          <h5 class="fw-bold mb-3"><i class="fas fa-newspaper me-2" style="color:var(--color-primary)"></i>Noticias Recientes</h5>
          <div id="noticias-sidebar" class="loading-spinner py-2">
            <div class="spinner-border spinner-border-sm" role="status"></div>
          </div>
          <a href="noticias.html" class="btn btn-outline-primary btn-sm w-100 mt-3">Ver todas las noticias</a>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="footer-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
  initComponents('noticias');

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  async function loadArticle() {
    if(!id) { window.location.href = 'noticias.html'; return; }
    try {
      const data = await gasGet('getNoticia', { id });
      const n = data.noticia;
      if(!n) { window.location.href = 'noticias.html'; return; }

      document.getElementById('page-title').textContent = n.titulo + ' — Escuela Llankanao';
      document.getElementById('hero-title').textContent = n.titulo;
      document.getElementById('bc-title').textContent = n.titulo.substring(0,40) + (n.titulo.length>40?'...':'');

      const pageUrl = encodeURIComponent(window.location.href);
      const titleEnc = encodeURIComponent(n.titulo);

      document.getElementById('article-content').innerHTML = `
        <article class="bg-white rounded-4 shadow-sm p-4 p-md-5">
          <div class="d-flex flex-wrap gap-3 align-items-center mb-4 pb-4 border-bottom">
            ${n.categoria?`<span class="cat-badge" style="font-size:.85rem;padding:.35rem .9rem">${n.categoria}</span>`:''}
            <span class="text-muted"><i class="fas fa-calendar me-1"></i>${formatFecha(n.fecha)}</span>
            ${n.autor?`<span class="text-muted"><i class="fas fa-user me-1"></i>${n.autor}</span>`:''}
          </div>
          ${n.imagen?`<img src="${n.imagen}" alt="${n.titulo}" class="img-fluid rounded-3 mb-4 w-100" style="max-height:450px;object-fit:cover">`:''}
          <div class="news-content">${(n.contenido||'').replace(/\n/g,'<br>')}</div>
          <div class="mt-5 pt-4 border-top d-flex flex-wrap gap-3 justify-content-between align-items-center">
            <a href="noticias.html" class="btn btn-outline-primary"><i class="fas fa-arrow-left me-2"></i>Volver a Noticias</a>
            <div class="d-flex gap-2 align-items-center">
              <span class="text-muted small">Compartir:</span>
              <a href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="fab fa-facebook-f"></i></a>
              <a href="https://twitter.com/intent/tweet?url=${pageUrl}&text=${titleEnc}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="fab fa-twitter"></i></a>
              <a href="https://wa.me/?text=${titleEnc}%20${pageUrl}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="fab fa-whatsapp"></i></a>
            </div>
          </div>
        </article>`;
    } catch(e) {
      document.getElementById('article-content').innerHTML = `
        <div class="text-center py-5 text-muted">
          <i class="fas fa-exclamation-circle fa-3x mb-2"></i>
          <p>No se pudo cargar la noticia.</p>
          <a href="noticias.html" class="btn btn-primary mt-2">Volver a Noticias</a>
        </div>`;
    }
  }

  async function loadSidebar() {
    try {
      const data = await gasGet('getNoticias', { limit: 4 });
      const noticias = (data.noticias||[]).filter(n=>n.id!==id).slice(0,4);
      document.getElementById('noticias-sidebar').innerHTML = noticias.map(r => `
        <div class="d-flex gap-3 mb-3 pb-3 border-bottom">
          ${r.imagen?`<img src="${r.imagen}" class="rounded-2 flex-shrink-0" style="width:60px;height:60px;object-fit:cover" alt="">`:`<div class="rounded-2 flex-shrink-0 d-flex align-items-center justify-content-center" style="width:60px;height:60px;background:var(--color-primary)"><i class="fas fa-newspaper text-white small"></i></div>`}
          <div>
            <a href="noticia.html?id=${r.id}" class="text-decoration-none text-dark fw-semibold small d-block" style="line-height:1.3">${truncate(r.titulo,60)}</a>
            <small class="text-muted">${formatFecha(r.fecha)}</small>
          </div>
        </div>`).join('') || '<p class="text-muted small">Sin otras noticias.</p>';
    } catch(e) { document.getElementById('noticias-sidebar').innerHTML = ''; }
  }

  loadArticle();
  loadSidebar();
</script>
</body></html>
