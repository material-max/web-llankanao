<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Calendario — Escuela Llankanao</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="navbar-container"></div>
<div id="avisos-container"></div>
<div class="page-hero"><div class="container">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Inicio</a></li><li class="breadcrumb-item active">Calendario</li></ol></nav>
  <h1>Calendario Escolar <span id="cal-year"></span></h1><p>Fechas importantes del año académico</p>
</div></div>
<section class="py-5"><div class="container">
  <div class="row g-4">
    <div class="col-lg-8" id="cal-content">
      <div class="text-center py-5 text-muted"><div class="spinner-border" role="status"></div><p class="mt-2">Cargando...</p></div>
    </div>
    <div class="col-lg-4">
      <div class="card border-0 shadow p-4 sticky-top" style="top:100px">
        <h5 class="fw-bold mb-3"><i class="fas fa-info-circle me-2" style="color:var(--color-primary)"></i>Referencias</h5>
        <div class="d-flex flex-column gap-2 mb-3">
          <div class="d-flex align-items-center gap-2"><span class="badge bg-primary">&nbsp;&nbsp;</span><span class="small">Evento institucional</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge bg-success">&nbsp;&nbsp;</span><span class="small">Actividad académica</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge bg-warning text-dark">&nbsp;&nbsp;</span><span class="small">Evaluación</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge bg-danger">&nbsp;&nbsp;</span><span class="small">Feriado</span></div>
          <div class="d-flex align-items-center gap-2"><span class="badge bg-info text-dark">&nbsp;&nbsp;</span><span class="small">Vacaciones</span></div>
        </div>
        <div class="alert border-0 rounded-3 p-3" style="background:#fff8e1"><small><i class="fas fa-exclamation-triangle me-2" style="color:#D4A843"></i>Sujeto a modificaciones del MINEDUC y DAEM Linares.</small></div>
      </div>
    </div>
  </div>
</div></section>
<div id="footer-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
initComponents('calendario'); loadAvisos();
document.getElementById('cal-year').textContent = new Date().getFullYear();
const TIPO_COLOR = {evento:'primary',academico:'success',evaluacion:'warning',feriado:'danger',vacaciones:'info'};
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
async function cargarCal() {
  const container = document.getElementById('cal-content');
  try {
    const data = await gasGet('getCalendario');
    const eventos = data.eventos || [];
    if(!eventos.length) { container.innerHTML='<div class="text-center py-5 text-muted"><i class="fas fa-calendar fa-4x mb-3"></i><p>El calendario del año estará disponible pronto.</p><a href="admin.html" class="btn btn-sm btn-outline-primary">Administrar</a></div>'; return; }
    const porMes = {};
    eventos.forEach(e => { const m=new Date(e.fecha+'T12:00:00').getMonth(); if(!porMes[m]) porMes[m]=[]; porMes[m].push(e); });
    container.innerHTML = '<div class="row g-3">'+Object.keys(porMes).sort((a,b)=>a-b).map(m=>`
      <div class="col-md-6"><div class="card border-0 shadow-sm h-100">
        <div class="card-header border-0 fw-bold" style="background:var(--color-primary);color:white">${MESES[m]}</div>
        <div class="card-body p-3">${porMes[m].map(e=>`
          <div class="d-flex align-items-start gap-2 mb-2">
            <span class="badge bg-${TIPO_COLOR[e.tipo]||'secondary'} flex-shrink-0 mt-1">&nbsp;</span>
            <div><div class="small fw-semibold">${e.titulo}</div>
            <small class="text-muted">${formatFecha(e.fecha)}${e.fecha_fin?' – '+formatFecha(e.fecha_fin):''}</small>
            ${e.descripcion?`<br><small class="text-muted">${e.descripcion}</small>`:''}</div>
          </div>`).join('')}
        </div></div></div>`).join('')+'</div>';
  } catch(e) { container.innerHTML='<div class="text-center py-5 text-muted"><i class="fas fa-calendar fa-4x mb-3"></i><p>El calendario estará disponible pronto.</p></div>'; }
}
cargarCal();
</script></body></html>
