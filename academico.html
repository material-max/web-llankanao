<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Académico — Escuela Llankanao</title>
<link rel="icon" href="assets/img/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<div id="navbar-container"></div>
<div id="avisos-container"></div>
<div class="page-hero"><div class="container">
  <nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="index.html">Inicio</a></li><li class="breadcrumb-item active">Académico</li></ol></nav>
  <h1>Oferta Académica</h1><p>Plan de estudios y formación integral</p>
</div></div>

<section class="py-5"><div class="container">
  <div class="text-center mb-5"><span class="section-badge">Niveles</span><h2 class="section-title">Niveles Educativos</h2><p class="text-muted">1° a 8° año básico</p></div>
  <div id="niveles-grid" class="row g-3"><div class="col-12 text-center py-4"><div class="spinner-border" role="status"></div></div></div>
</div></section>

<section class="py-5 bg-light"><div class="container">
  <div class="text-center mb-5"><span class="section-badge">Asignaturas</span><h2 class="section-title">Plan de Estudios</h2></div>
  <div id="asig-grid" class="row g-3"></div>
</div></section>

<section class="py-5"><div class="container">
  <div class="row g-5 align-items-center">
    <div class="col-lg-6 reveal">
      <span class="section-badge">Programas</span><h2 class="section-title">Programas Especiales</h2>
      <div id="programas-list" class="d-flex flex-column gap-3"></div>
    </div>
    <div class="col-lg-6 reveal">
      <div id="horario-card" class="p-4 rounded-4" style="background:linear-gradient(135deg,var(--color-primary),var(--color-accent))">
        <h4 class="text-white mb-4"><i class="fas fa-calendar-check me-2"></i>Horario General</h4>
        <table class="table table-borderless text-white mb-0" id="horario-table"></table>
      </div>
    </div>
  </div>
</div></section>

<div id="footer-container"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script>
initComponents('academico'); loadAvisos();
const NIVEL_COLORS=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#1B4F8A'];
async function cargarAcademico() {
  try {
    const data = await gasGet('getAcademico');
    const ac = data.academico || {};
    // Niveles
    const niveles = ac.niveles || [];
    document.getElementById('niveles-grid').innerHTML = niveles.map((n,i)=>`
      <div class="col-lg-3 col-md-4 col-sm-6 reveal">
        <div class="card border-0 shadow-sm h-100 text-center p-4">
          ${n.foto?`<img src="${n.foto}" class="rounded-circle mx-auto mb-3" style="width:80px;height:80px;object-fit:cover" alt="">`:`<div class="mb-3 mx-auto d-flex align-items-center justify-content-center" style="background:${NIVEL_COLORS[i%8]};color:white;width:60px;height:60px;border-radius:50%;font-size:1.1rem;font-weight:700">${i+1}°</div>`}
          <h6 class="fw-bold">${n.nombre}</h6><p class="text-muted small">${n.descripcion}</p>
        </div>
      </div>`).join('') || '<div class="col-12 text-center text-muted">Sin niveles configurados</div>';
    // Asignaturas
    const asigs = ac.asignaturas || [];
    document.getElementById('asig-grid').innerHTML = asigs.map(a=>`
      <div class="col-lg-4 col-md-6 reveal">
        <div class="d-flex align-items-center p-3 bg-white rounded-3 shadow-sm gap-3">
          <div style="background:${a.color||'#1B4F8A'};width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="${a.icono||'fas fa-book'} text-white"></i>
          </div>
          <span class="fw-bold small">${a.nombre}</span>
        </div>
      </div>`).join('') || '<div class="col-12 text-center text-muted">Sin asignaturas configuradas</div>';
    // Programas
    const progs = ac.programas || [];
    document.getElementById('programas-list').innerHTML = progs.map(p=>`
      <div class="d-flex align-items-start">
        <i class="fas fa-check-circle text-success me-3 mt-1 fa-lg"></i>
        <div><strong>${p.nombre}</strong><p class="text-muted mb-0 small">${p.descripcion}</p></div>
      </div>`).join('') || '<p class="text-muted">Sin programas configurados</p>';
    // Horario
    const h = ac.horario || {};
    document.getElementById('horario-table').innerHTML = [
      ['fas fa-sun','Jornada mañana',h.manana||'—'],
      ['fas fa-cloud-sun','Almuerzo',h.almuerzo||'—'],
      ['fas fa-moon','Jornada tarde',h.tarde||'—'],
      ['fas fa-calendar','Días hábiles',h.dias||'—']
    ].map(r=>`<tr><td><i class="${r[0]} me-2"></i>${r[1]}</td><td class="fw-bold">${r[2]}</td></tr>`).join('');
  } catch(e) { console.error(e); }
}
cargarAcademico();
</script></body></html>
